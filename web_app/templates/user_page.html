<!DOCTYPE html>
<html>

<head>
    <title>User</title>
    <link href="{{ url_for('static', filename='styles/styles.css') }}" rel="stylesheet" />
    <link href="{{ url_for('static', filename='styles/components.css') }}" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alice&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/039d331876.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- <div class="loader"></div> -->

    <h2>User data</h2>

    <div class="user-info">
        <div class=".user-info-data-row">
            <span class="user-info-label">Name </span>
            <span class="user-info-color">{{ user[0] }}</span>
        </div>
        <div class=".user-info-data-row">
            <span class="user-info-label">Surname </span>
            <span class="user-info-color">{{ user[1] }}</span>
        </div>
        <div class=".user-info-data-row">
            <span class="user-info-label">Gmail </span>
            <span class="user-info-color">{{ user[2] }}</span>
        </div>
        <div class=".user-info-data-row">
            <span class="user-info-label">Region </span>
            <span class="user-info-color">{{ user[3] }}</span>
        </div>
    </div>

    <button class="button yellow" type="button" id="return_nutton">Return to the previous page</button>
    <script src="{{ url_for('static', filename='scripts/user_page.js') }}"></script>
</body>

</html>
