<!DOCTYPE html>

<head>
    <title>Field Creation</title>
    <link href="{{ url_for('static', filename='styles/styles.css') }}" rel="stylesheet" />
    <link href="{{ url_for('static', filename='styles/components.css') }}" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alice&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/039d331876.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- <div class="loader"></div> -->

    <div class="centering-vertical">
        <h1 class="smaller-title">Field creation</h1>

        <form id="field_form" enctype="multipart/form-data" method="POST"
            action="/diploma/fertilizer_recommendation/field_creation">

            <div class=" fields-grid">
                <div class="field-group">
                    <label class="field-label" for="field_name">Field Name:</label>
                    <input class="input yellow" type="text" id="field_name" name="field_name"
                        placeholder="Enter Field Name" required>

                    <label class="field-label" for="area">Area:</label>
                    <input class="input yellow" type="text" id="area" name="area" placeholder="Enter Field Area"
                        required>

                    <label class="field-label" for="farm">Farm:</label>
                    <input class="input yellow" type="text" id="farm" name="farm" placeholder="Enter Farm name"
                        required>
                </div>

                <div class="field-group">
                    <label class="field-label" for="crop">Crop:</label>
                    <select class="input yellow" id="crop" name="crop">
                        <option value="Sunflower">Sunflower</option>
                        <option value="Corn">Corn</option>
                        <option value="Rapeseed">Rapeseed</option>
                        <option value="Soya">Soya</option>
                    </select>

                    <label class="field-label" for="target_yield">Ton:</label>
                    <input class="input yellow" type="text" id="target_yield" name="target_yield_field"
                        placeholder="How many tons of Crop you want to grow?" required>

                    <label class="field-label" for="fertilizer_type">Fertilizer type:</label>
                    <select class="input yellow" id="fertilizer_type" name="fertilizer_type">
                        <option value="Soil">Soil</option>
                        <option value=" Soil / protected soil"> Soil / protected soil</option>
                        <option value="Foliar (g/L)">Foliar</option>
                        <option value="Seed treatment (g/L)"> Seed treatment (g/L)</option>
                        <option value="Water-soluble">Water Soluble</option>
                        <option value="Drip-irrigation/ Fertigation">Drip Irrigation/Fertigation</option>
                    </select>
                </div>

                <div class="field-group">
                    <label class="field-label" for="soil_analysis">Upload Chemical Soil Analysis:</label>
                    <label for="soil_analysis" class="input yellow">Upload file</label>
                    <input type="file" id="soil_analysis" name="soil_analysis" accept=".csv" style="display: none;" />
                </div>

                <button class="button green" type="submit" id="submit_field_creation">Submit</button>

            </div>
        </form>
    </div>
    <script src="{{ url_for('static', filename='scripts/field_creation.js') }}"></script>
</body>

</html>
