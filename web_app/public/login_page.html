<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login page</title>
    <link href="./styles/styles.css" rel="stylesheet" />
    <link href="./styles/components.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alice&display=swap" rel="stylesheet">
</head>

<body>
    <div class="centering-vertical full-page">
        <h1 class="title">Log in</h1>

        <div class="field-group">
            <label for="gmail">Gmail:</label>
            <input class="input yellow" type="text" id="gmail" name="gmail" placeholder="Enter Gmail" required>
        </div>

        <div class="field-group">
            <label for="password">Password:</label>
            <input class="input yellow" type="password" id="password" name="password" placeholder="Enter your password"
                required>
        </div>

        <button class="long-button yellow" type="button">Submit</button>

        <a class="link" href="register_page.html">I don't have an account and need to create one</a>


        <img class="img-right" src="./images/agrosem_logo.png" alt="Logo">
        <img class="img-left" src="./images/sunflowers.png" alt="Logo">

    </div>
</body>

</html>
