<!DOCTYPE html>

<head>
    <title>Registration page</title>
    <link href="./styles/styles.css" rel="stylesheet" />
    <link href="./styles/components.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alice&display=swap" rel="stylesheet">
</head>

<body>
    <div class="centering-vertical full-page">
        <h1 class="title">Sign up</h1>

        <div class="register-form">
            <div class="fields-grid">
                <div class="field-group">
                    <label for="name">Name:</label>
                    <input class="input yellow" type="text" id="name" name="name" placeholder="Enter Name" required>

                    <label for="surname">Surname:</label>
                    <input class="input yellow" type="text" id="surname" name="surname" placeholder="Enter Surname"
                        required>

                    <label for="region">Region:</label>
                    <input class="input yellow" type="text" id="region" name="region" placeholder="Enter your Region"
                        required>
                </div>

                <div class="field-group">
                    <label for="gmail">Gmail:</label>
                    <input class="input yellow" type="text" id="gmail" name="gmail" placeholder="Enter Gmail" required>

                    <label for="password">Password:</label>
                    <input class="input yellow" type="password" id="password" name="password"
                        placeholder="Enter your password" required>

                    <label for="repeat-password">Repeat password:</label>
                    <input class="input yellow" type="password" id="repeat-password" name="repeat-password"
                        placeholder="Repeat your password" required>
                </div>
            </div>

            <button class="long-button yellow" type="button">Submit</button>

            <a class="link" href="login_page.html">I already have an account</a>


            <img class="img-right" src="./images/agrosem_logo.png" alt="Logo">
            <img class="img-left" src="./images/sunflowers.png" alt="Logo">

        </div>
    </div>
</body>
